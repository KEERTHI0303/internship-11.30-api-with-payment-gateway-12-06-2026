<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>

<header>
    <h1>My E-Commerce Store</h1>
    <div class="cart">
        🛒 Cart: <span id="cart-count">0</span>
    </div>
</header>

<section class="products">

    <div class="product">
        <img src="./laptop.jpg" alt="Product">
        <h3>Laptop</h3>
        <p>₹50,000</p>
        <button onclick="addToCart('Laptop',50000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="./Mobile.jpg" alt="Product">
        <h3>Mobile</h3>
        <p>₹20,000</p>
        <button onclick="addToCart('Mobile',20000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="./Headphone.jpg" alt="Product">
        <h3>Headphones</h3>
        <p>₹2,000</p>
        <button onclick="addToCart('Headphones',2000)">
            Add to Cart
        </button>
    </div>
 <div class="product">
        <img src="./Headphone.jpg" alt="Product">
        <h3>power bank</h3>
        <p>₹7,000</p>
        <button onclick="addToCart('power bank',7000)">
            Add to Cart
        </button>
    </div>
</section>

<section class="cart-section">
    <h2>Shopping Cart</h2>

    <ul id="cart-items"></ul>

    <h3>
        Total: ₹<span id="total">0</span>
    </h3>

    <button class="pay-btn" onclick="payNow()">  
        Proceed to Payment
    </button>
</section>

<script src="script.js"></script>

</body>
</html>
